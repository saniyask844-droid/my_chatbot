<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zevoir Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; touch-action: manipulation; }
        
        body { background: #f8fafc; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: fixed; width: 100%; }
        
        #chat-container { width: 100%; max-width: 500px; height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); overflow: hidden; }
        @media (min-width: 481px) { #chat-container { height: 92vh; border-radius: 30px; } }

        #header { padding: 25px 20px; border-bottom: 2px solid #f1f5f9; display: flex; align-items: center; gap: 18px; background: white; }
        .z-logo { width: 55px; height: 55px; border-radius: 15px; overflow: hidden; background: #f1f5f9; }
        .z-logo img { width: 100%; height: 100%; object-fit: cover; }
        #header p { font-weight: 800; font-size: 28px; color: #1e293b; letter-spacing: -1px; }

        #chat-box { flex: 1; padding: 30px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 22px; background: #fcfcfc; }

        .message { padding: 18px 22px; border-radius: 22px; font-size: 16px; max-width: 90%; line-height: 1.5; word-wrap: break-word; position: relative; }
        .user-msg { align-self: flex-end; background: #3b82f6; color: white; border-bottom-right-radius: 5px; }
        .bot-msg { align-self: flex-start; background: #ffffff; color: #334155; border: 1.5px solid #f1f5f9; border-bottom-left-radius: 5px; }

        .typing-container { display: flex; gap: 6px; padding: 8px 0; align-items: center; min-height: 20px; }
        .dot { width: 10px; height: 10px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        #input-area { padding: 20px; display: flex; gap: 10px; border-top: 2px solid #f1f5f9; background: white; }
        #user-input { flex: 1; border: 2px solid #e2e8f0; border-radius: 15px; padding: 15px; outline: none; font-size: 16px; background: #f8fafc; }
        #send-btn { background: #3b82f6; color: white; border: none; padding: 0 20px; border-radius: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">
            <div class="z-logo"><img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png"></div>
            <p>Zevoir Chatbot</p>
        </div>
        <div id="chat-box"></div>
        <form id="chat-form" style="display:contents;">
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Type here..." autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </div>
        </form>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const chatForm = document.getElementById('chat-form');

        // Page load ayinappudu session check chestundi
        window.onload = () => {
            const saved = JSON.parse(sessionStorage.getItem('zevoir_history')) || [];
            if(saved.length === 0) {
                renderMessage("Hello! I am <b>Zevoir Chatbot</b> 🤖. How can I help you?", "bot-msg");
            } else {
                saved.forEach(m => renderMessage(m.text, m.type));
            }
        };

        // Message screen meeda chupinchadaniki matrame
        function renderMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Message save chesi display cheyadaniki
        function addMessage(text, type) {
            renderMessage(text, type);
            let history = JSON.parse(sessionStorage.getItem('zevoir_history')) || [];
            history.push({text, type});
            sessionStorage.setItem('zevoir_history', JSON.stringify(history));
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault(); 
            const msg = userInput.value.trim();
            if (!msg) return;

            addMessage(msg, "user-msg");
            userInput.value = "";
            userInput.disabled = true;

            const loadingMsg = document.createElement('div');
            loadingMsg.className = "message bot-msg";
            loadingMsg.id = "active-loading";
            loadingMsg.innerHTML = `<div class="typing-container"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chatBox.appendChild(loadingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            const delay = ms => new Promise(res => setTimeout(res, ms));

            try {
                const [response] = await Promise.all([
                    fetch('/get_response', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({message: msg})
                    }),
                    delay(2000) 
                ]);

                const data = await response.json();
                
                const loader = document.getElementById('active-loading');
                if(loader) loader.remove();
                addMessage(data.response, "bot-msg");

            } catch (err) {
                const loader = document.getElementById('active-loading');
                if(loader) loader.remove();
                addMessage("<b>Error:</b> Server issues. ⚠️", "bot-msg");
            } finally {
                userInput.disabled = false;
                userInput.focus();
            }
        };
    </script>
</body>
</html>
