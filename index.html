<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zevoir Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f8fafc; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%); filter: blur(60px); z-index: -1; animation: move 15s infinite alternate; }
        @keyframes move { from { transform: translate(-30%, -30%); } to { transform: translate(30%, 30%); } }

        #chat-container { width: 95%; max-width: 480px; height: 85vh; max-height: 750px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 28px; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); overflow: hidden; }
        #header { padding: 25px; border-bottom: 1px solid rgba(0, 0, 0, 0.05); display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .z-logo { width: 42px; height: 42px; background: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }

        .message { padding: 14px 18px; border-radius: 18px; font-size: 14.5px; max-width: 85%; line-height: 1.6; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #3b82f6; color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15); }
        .bot-msg { align-self: flex-start; background: #ffffff; color: #334155; border: 1px solid #f1f5f9; border-bottom-left-radius: 4px; }

        /* Loading Animation Style */
        .typing { display: flex; gap: 4px; padding: 10px; }
        .typing span { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

        #input-area { padding: 18px; background: #ffffff; border-top: 1px solid rgba(0, 0, 0, 0.05); display: flex; gap: 12px; border-radius: 0 0 28px 28px; flex-shrink: 0; }
        #user-input { flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 12px 18px; color: #1e293b; outline: none; transition: 0.2s; }
        #user-input:focus { border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        #send-btn { background: #3b82f6; color: white; border: none; padding: 0 22px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        #send-btn:hover { background: #2563eb; transform: translateY(-1px); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div id="chat-container">
        <div id="header">
            <div class="z-logo">Z</div>
            <div><p style="font-weight: 700; font-size: 20px; color: #1e293b; letter-spacing: -0.5px;">Zevoir Chatbot</p></div>
        </div>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Enter a message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        window.onload = () => { addMessage("Systems initialized. I am <b>Zevoir Chatbot</b>. Provide a User ID to begin synthesis.", "bot-msg"); };

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const msg = userInput.value.trim();
            if (!msg) return;

            addMessage("🔍 <b>Search ID:</b> " + msg, "user-msg");
            userInput.value = "";

            // Loading Animation setup
            const loadingDiv = document.createElement('div');
            loadingDiv.className = "message bot-msg";
            loadingDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/get_response', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await response.json();
                chatBox.removeChild(loadingDiv); // Remove dots
                addMessage(data.reply, "bot-msg");
            } catch (e) {
                chatBox.removeChild(loadingDiv);
                addMessage("<b>Error:</b> Server unreachable.", "bot-msg");
            }
        }

        sendBtn.onclick = handleSend;
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>
</body>
</html>
